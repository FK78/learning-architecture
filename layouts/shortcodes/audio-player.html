{{ $part := .Get "part" }}
{{ $audioBase := printf "audio/%s" $part }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  var base = {{ printf "%s/" $audioBase | relURL }};
  fetch(base + 'manifest.json')
    .then(function(r) { return r.json(); })
    .then(function(sections) {
      var headings = document.querySelectorAll('h2, h3');
      var matched = [];

      function normalize(str) {
        if (!str) return '';
        // Decode HTML entities and normalize whitespace
        var el = document.createElement('span');
        el.innerHTML = str;
        return el.textContent.trim().replace(/\s+/g, ' ');
      }

      function headingText(h) {
        // Get text without any existing audio buttons
        var clone = h.cloneNode(true);
        var btns = clone.querySelectorAll('.inline-audio-btn');
        btns.forEach(function(b) { b.remove(); });
        return clone.textContent.trim().replace(/\s+/g, ' ');
      }

      sections.forEach(function(s) {
        var target = null;
        var sTitle = normalize(s.title);
        var sParent = s.parent ? normalize(s.parent) : null;

        if (sParent) {
          // Find h3 under the correct h2 parent
          var inParent = false;
          for (var i = 0; i < headings.length; i++) {
            var h = headings[i];
            if (h.tagName === 'H2') {
              inParent = (headingText(h) === sParent);
            } else if (h.tagName === 'H3' && inParent && headingText(h) === sTitle && matched.indexOf(h) === -1) {
              target = h;
              break;
            }
          }
        } else {
          // Top-level: match h2 or standalone h3
          for (var j = 0; j < headings.length; j++) {
            if (headingText(headings[j]) === sTitle && matched.indexOf(headings[j]) === -1) {
              target = headings[j];
              break;
            }
          }
        }

        if (target) {
          matched.push(target);
          var btn = document.createElement('button');
          btn.className = 'inline-audio-btn';
          btn.innerHTML = '🔊';
          btn.title = 'Listen to this section';
          btn.setAttribute('data-src', base + s.file);
          btn.onclick = function() { toggleInlineAudio(this); };
          target.appendChild(btn);
        }
      });
    })
    .catch(function(err) { console.error('Audio manifest error:', err); });
});
</script>
