{{ $part := .Get "part" }}
{{ $audioBase := printf "audio/%s" $part }}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const base = {{ printf "%s/" $audioBase | relURL }};
  fetch(base + 'manifest.json')
    .then(function(r) { return r.json(); })
    .then(function(sections) {
      sections.forEach(function(s) {
        var headings = document.querySelectorAll('h2, h3');
        for (var i = 0; i < headings.length; i++) {
          var h = headings[i];
          if (h.textContent.trim() === s.title) {
            var btn = document.createElement('button');
            btn.className = 'inline-audio-btn';
            btn.innerHTML = '🔊';
            btn.title = 'Listen to this section';
            btn.setAttribute('data-src', base + s.file);
            btn.onclick = function() { toggleInlineAudio(this); };
            h.appendChild(btn);
            break;
          }
        }
      });
    })
    .catch(function() {});
});
</script>
